<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donesy Kanban</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="app-title">Donesy Kanban</h1>

      <!-- Login view -->
      <div id="login-view" class="auth-wrapper">
        <div class="auth-card" id="login-section">
          <h2>LOGIN</h2>

          <form id="login-form">
            <div class="input-group">
              <input
                type="email"
                id="login-email"
                name="email"
                required
                placeholder="E-mail"
              />
            </div>

            <div class="input-group">
              <input
                type="password"
                id="login-password"
                name="password"
                required
                placeholder="Password"
              />
            </div>

            <button type="submit" class="auth-btn">LOGIN</button>
          </form>

          <div id="login-message" class="message"></div>

          <p class="switch-text">
            Don't have an account?
            <a href="#" id="show-register">Create account</a>
          </p>
        </div>

        <user-create class="hidden" id="register-section"></user-create>
      </div>

      <!-- Account view -->
      <div id="account-view" class="auth-wrapper hidden">
        <div class="auth-card user-card">
          <h2>MY ACCOUNT</h2>

          <div class="profile-table">
            <div class="profile-row">
              <span class="profile-label">Name</span>
              <span class="profile-value" id="display-name"></span>
            </div>
            <div class="profile-row">
              <span class="profile-label">Email</span>
              <span class="profile-value" id="display-email"></span>
            </div>
          </div>

          <user-edit id="edit-section"></user-edit>

          <hr class="divider" />

          <user-delete id="delete-section"></user-delete>

          <hr class="divider" />

          <button id="logout-btn" class="auth-btn logout-btn">LOGOUT</button>
        </div>
      </div>
    </div>

    <script src="components/userCreate.mjs" type="module"></script>
    <script src="components/userEdit.mjs" type="module"></script>
    <script src="components/userDelete.mjs" type="module"></script>
    <script src="controllers/appController.mjs" type="module"></script>
  </body>
</html>
