<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donesy Kanban</title>
    <meta name="theme-color" content="#4a7ba7" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <main id="main-content">
      <div class="container">
        <h1 class="app-title">Donesy Kanban</h1>

        <div id="login-view" class="auth-wrapper hidden">
          <div class="auth-card" id="login-section">
            <h2 data-i18n="login.title">LOGIN</h2>

            <form id="login-form">
              <div class="input-group">
                <label for="login-email" class="sr-only" data-i18n="login.email"
                  >E-mail</label
                >
                <input
                  type="email"
                  id="login-email"
                  name="email"
                  required
                  placeholder="E-mail"
                  data-i18n-placeholder="login.email"
                  autocomplete="email"
                />
              </div>

              <div class="input-group">
                <label
                  for="login-password"
                  class="sr-only"
                  data-i18n="login.password"
                  >Password</label
                >
                <input
                  type="password"
                  id="login-password"
                  name="password"
                  required
                  placeholder="Password"
                  data-i18n-placeholder="login.password"
                  autocomplete="current-password"
                />
              </div>

              <button type="submit" class="auth-btn" data-i18n="login.button">
                LOGIN
              </button>
            </form>

            <div
              id="login-message"
              class="message"
              role="status"
              aria-live="polite"
            ></div>

            <p class="switch-text">
              <span data-i18n="login.no_account">Don't have an account?</span>
              <a href="#" id="show-register" data-i18n="login.create_account"
                >Create account</a
              >
            </p>
          </div>

          <user-create class="hidden" id="register-section"></user-create>
        </div>

        <div id="account-view" class="auth-wrapper hidden">
          <div class="auth-card user-card">
            <h2 data-i18n="account.title">MY ACCOUNT</h2>

            <div class="profile-table">
              <div class="profile-row">
                <span class="profile-label" data-i18n="account.name">Name</span>
                <span class="profile-value" id="display-name"></span>
              </div>
              <div class="profile-row">
                <span class="profile-label" data-i18n="account.email"
                  >Email</span
                >
                <span class="profile-value" id="display-email"></span>
              </div>
            </div>

            <user-edit id="edit-section"></user-edit>

            <hr class="divider" />

            <user-delete id="delete-section"></user-delete>

            <hr class="divider" />

            <button
              id="logout-btn"
              class="auth-btn logout-btn"
              data-i18n="account.logout"
            >
              LOGOUT
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="components/userCreate.mjs" type="module"></script>
    <script src="components/userEdit.mjs" type="module"></script>
    <script src="components/userDelete.mjs" type="module"></script>
    <script src="controllers/appController.mjs" type="module"></script>
    <script>
      if ("serviceWorker" in navigator) {
        const isLocalhost = ["localhost", "127.0.0.1", "::1"].includes(
          window.location.hostname,
        );

        window.addEventListener("load", async function () {
          if (isLocalhost) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if ("caches" in window) {
              const keys = await caches.keys();
              await Promise.all(
                keys
                  .filter((key) => key.startsWith("donesy-"))
                  .map((key) => caches.delete(key)),
              );
            }

            return;
          }

          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>
